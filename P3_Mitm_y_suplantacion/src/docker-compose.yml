services:
  victima:
    image: alpine:latest
    container_name: p3-victima
    command: sh -c "apk add --no-cache iputils curl && ip route add 192.168.20.0/24 via 192.168.10.2 && sleep infinity"
    networks:
      lan_interna:
        ipv4_address: 192.168.10.20
    cap_add:
      - NET_ADMIN
      - NET_RAW

  router:
    image: alpine:latest
    container_name: p3-router
    command: sh -c "apk add --no-cache iptables && sleep infinity"
    networks:
      lan_interna:
        ipv4_address: 192.168.10.2
      lan_externa:
        ipv4_address: 192.168.20.2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1

  servidor_web:
    image: nginx:alpine
    container_name: p3-servidor-web
    entrypoint: sh -c "ip route add 192.168.10.0/24 via 192.168.20.2 && /docker-entrypoint.sh nginx -g 'daemon off;'"
    networks:
      lan_externa:
        ipv4_address: 192.168.20.10
    cap_add:
      - NET_ADMIN

networks:
  lan_interna:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
  lan_externa:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/24
